<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chorus Workflow Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a12;
            --bg-card: rgba(255, 255, 255, 0.03);
            --claude-color: #d97706; /* Amber/Orange */
            --gemini-color: #3b82f6; /* Blue */
            --codex-color: #10b981;  /* Emerald */
            --user-color: #f472b6;   /* Pink */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: 0 0 20px rgba(59, 130, 246, 0.5);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
        }

        /* Header */
        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo-area h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 0.25rem 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        /* Main Canvas Area */
        main {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg#workflow-svg {
            width: 1000px;
            height: 600px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* Node Styles */
        .node {
            cursor: pointer;
            transition: var(--transition);
        }

        .node circle {
            stroke-width: 2;
            fill: #161625;
            transition: var(--transition);
        }

        .node text {
            fill: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            pointer-events: none;
            text-anchor: middle;
        }

        .node:hover circle {
            r: 55;
            stroke-width: 4;
        }

        .node.active circle {
            filter: drop-shadow(0 0 15px currentColor);
            stroke-width: 4;
        }

        /* Connection Lines */
        .link {
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 10;
            transition: var(--transition);
        }

        .link-active {
            stroke-width: 3;
            stroke-dasharray: 0;
            animation: pulse-line 1.5s infinite;
        }

        /* Control Panel */
        .controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
            border-radius: 99px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gemini-color);
        }

        button.primary {
            background: var(--gemini-color);
            border-color: transparent;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Console/Info Panel */
        #console {
            position: absolute;
            right: 2rem;
            top: 8rem;
            width: 340px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
            backdrop-filter: blur(20px);
            max-height: 65vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #console h3 {
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
        }

        .log-entry {
            margin-bottom: 0.75rem;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>AI CHORUS <span class="badge">VERSION 1.0</span></h1>
    </div>
    <div class="subtitle" style="color: var(--text-secondary); font-size: 0.9rem;">
        MULTI-MODEL ORCHESTRATION VISUALIZER
    </div>
</header>

<main>
    <svg id="workflow-svg" viewBox="0 0 1000 600">
        <!-- Persistent Lines -->
        <path id="user-to-claude" class="link" d="M 150,300 Q 250,200 400,250" />
        <path id="claude-to-gemini" class="link" d="M 450,300 L 700,450" />
        <path id="gemini-to-file" class="link" d="M 750,530 L 750,580" />
        <path id="gemini-to-claude" class="link" d="M 700,450 Q 550,450 450,350" />
        <path id="claude-to-codex" class="link" d="M 450,250 L 700,150" />
        <path id="codex-to-claude" class="link" d="M 700,150 Q 550,150 450,220" />
        <path id="claude-to-output" class="link" d="M 450,300 L 900,300" />

        <!-- Nodes -->
        <g class="node" id="node-user" transform="translate(100, 300)">
            <circle r="50" stroke="#f472b6" />
            <text class="icon" y="-5" style="font-size: 32px">🧑‍💻</text>
            <text y="30" style="fill: white; font-weight: bold">トミーさん</text>
        </g>

        <g class="node" id="node-claude" transform="translate(450, 275)">
            <circle r="60" stroke="#d97706" />
            <text class="icon" y="-5" style="font-size: 32px">🤖</text>
            <text y="30" style="fill: white; font-weight: bold">操縦士: Claude</text>
        </g>

        <g class="node" id="node-gemini" transform="translate(750, 480)">
            <circle r="50" stroke="#3b82f6" />
            <text class="icon" y="-5" style="font-size: 32px">👁️</text>
            <text y="30" style="fill: white; font-weight: bold">偵察機: Gemini</text>
        </g>

        <g class="node" id="node-codex" transform="translate(750, 120)">
            <circle r="50" stroke="#10b981" />
            <text class="icon" y="-5" style="font-size: 32px">⚖️</text>
            <text y="30" style="fill: white; font-weight: bold">顧問: Codex</text>
        </g>

        <g id="node-local" transform="translate(750, 580)" opacity="0.5">
            <rect x="-30" y="-10" width="60" height="20" rx="4" fill="#333" />
            <text y="5" style="font-size: 8px; fill: #fff; text-anchor: middle;">LOCAL FILE</text>
        </g>

        <g id="packets"></g>
    </svg>

    <div id="console">
        <h3>システムログ</h3>
        <div id="log-container">
            <div class="log-entry"><span class="status-dot" style="background:#fff"></span>準備完了</div>
            <div class="log-entry"><span class="status-dot" style="background:#fff"></span>指示を待機しています...</div>
        </div>
    </div>
</main>

<div class="controls">
    <button id="btn-auto" onclick="startAutoDemo()" class="primary">全プロセスを自動実行</button>
    <button id="btn-next" onclick="nextStep()">次へ進む ></button>
    <button onclick="reset()">リセット</button>
</div>

<script>
    const svg = document.getElementById('workflow-svg');
    const logContainer = document.getElementById('log-container');
    const nodes = {
        user: document.getElementById('node-user'),
        claude: document.getElementById('node-claude'),
        gemini: document.getElementById('node-gemini'),
        codex: document.getElementById('node-codex')
    };

    function addLog(msg, color="#fff") {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="status-dot" style="background:${color}"></span>${msg}`;
        logContainer.prepend(entry);
    }

    function animatePacket(pathId, color="#fff", duration=1000) {
        return new Promise(resolve => {
            const path = document.getElementById(pathId);
            const packet = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            packet.setAttribute("r", "5");
            packet.setAttribute("fill", color);
            packet.style.filter = `drop-shadow(0 0 8px ${color})`;
            document.getElementById('packets').appendChild(packet);

            const length = path.getTotalLength();
            let start = null;

            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = (timestamp - start) / duration;
                if (progress < 1) {
                    const point = path.getPointAtLength(progress * length);
                    packet.setAttribute("cx", point.x);
                    packet.setAttribute("cy", point.y);
                    requestAnimationFrame(step);
                } else {
                    packet.remove();
                    resolve();
                }
            }
            requestAnimationFrame(step);
        });
    }

    let currentStep = 0;
    let isRunning = false;

    const steps = [
        {
            name: "指示の受信",
            action: async () => {
                addLog("トミーさんの指示を確認：『新機能を作って』", "#f472b6");
                nodes.user.classList.add('active');
                await animatePacket('user-to-claude', '#f472b6', 1500);
                nodes.user.classList.remove('active');
            }
        },
        {
            name: "分析依頼",
            action: async () => {
                nodes.claude.classList.add('active');
                addLog("【操縦士】偵察機Geminiに全体調査を依頼...", "#d97706");
                await animatePacket('claude-to-gemini', '#d97706', 1000);
            }
        },
        {
            name: "巨大分析",
            action: async () => {
                nodes.gemini.classList.add('active');
                addLog("【偵察機】100万トークンの広大な視界でスキャン中...", "#3b82f6");
                await new Promise(r => setTimeout(r, 1000));
                addLog("【偵察機】調査報告書をローカルに保存しました。", "#3b82f6");
                await animatePacket('gemini-to-file', '#3b82f6', 800);
            }
        },
        {
            name: "要約報告",
            action: async () => {
                addLog("【偵察機】重要ポイントのみを操縦士へ報告します。", "#3b82f6");
                await animatePacket('gemini-to-claude', '#3b82f6', 1200);
                nodes.gemini.classList.remove('active');
            }
        },
        {
            name: "設計と相談",
            action: async () => {
                addLog("【操縦士】設計案を作成。顧問(Codex)に相談中...", "#d97706");
                await animatePacket('claude-to-codex', '#d97706', 1000);
            }
        },
        {
            name: "外部レビュー",
            action: async () => {
                nodes.codex.classList.add('active');
                addLog("【顧問】別のAIの視点から厳重チェック...", "#10b981");
                await new Promise(r => setTimeout(r, 1200));
                addLog("【顧問】改善案を見つけました。操縦士へ戻します。", "#10b981");
                await animatePacket('codex-to-claude', '#10b981', 1200);
                nodes.codex.classList.remove('active');
            }
        },
        {
            name: "最終実装",
            action: async () => {
                addLog("【操縦士】助言を反映し、最高のコードで実装！", "#d97706");
                await new Promise(r => setTimeout(r, 1000));
                await animatePacket('claude-to-output', '#fff', 1500);
                addLog("🎉 完了！新しい機能が実装されました。", "#10b981");
                nodes.claude.classList.remove('active');
            }
        }
    ];

    async function nextStep() {
        if (isRunning || currentStep >= steps.length) return;
        isRunning = true;
        updateButtons(true);
        await steps[currentStep].action();
        currentStep++;
        isRunning = false;
        updateButtons(false);
    }

    async function startAutoDemo() {
        reset();
        for (let i = 0; i < steps.length; i++) {
            await nextStep();
        }
    }

    function updateButtons(running) {
        document.getElementById('btn-next').disabled = running || currentStep >= steps.length;
        document.getElementById('btn-auto').disabled = running;
    }

    function reset() {
        currentStep = 0;
        isRunning = false;
        updateButtons(false);
        Object.values(nodes).forEach(n => n.classList.remove('active'));
        document.getElementById('packets').innerHTML = '';
        logContainer.innerHTML = '<h3>システムログ</h3><div class="log-entry"><span class="status-dot" style="background:#fff"></span>準備完了</div><div class="log-entry"><span class="status-dot" style="background:#fff"></span>指示を待機しています...</div>';
    }
</script>

</body>
</html>
